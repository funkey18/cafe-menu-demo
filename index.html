<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#db2777" />
    <meta name="description" content="Mahaan Cafe — Pure Vegetarian Food Menu" />
    <title>Mahaan Cafe — Food Menu</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="header">
      <div class="header-blobs" aria-hidden="true">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
        <div class="blob blob-4"></div>
      </div>

      <div class="header-content">
        <div class="decor-row">
          <div class="decor-line sm"></div>
          <div class="decor-dot sm"></div>
          <div class="decor-line sm"></div>
        </div>

        <h1 class="cafe-title">Mahaan Cafe</h1>

        <div class="decor-row">
          <div class="decor-line md"></div>
          <div class="decor-dot md"></div>
          <div class="decor-line md"></div>
        </div>

        <p class="menu-label">FOOD MENU</p>
        <div class="veg-badge">✦ Pure Vegetarian Delights ✦</div>
      </div>
    </header>

    <nav class="category-nav" aria-label="Menu categories">
      <div class="category-nav-inner" id="category-nav"></div>
    </nav>

    <main class="menu-wrap">
      <div class="menu-card">
        <div id="menu-root"></div>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
